<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" width="520" height="300">
  <defs>
    <style>
      .ln { opacity: 0; animation: fadein 0.25s ease forwards; }
      .ln:nth-child(1)  { animation-delay: 0.4s;  }
      .ln:nth-child(2)  { animation-delay: 1.0s;  }
      .ln:nth-child(3)  { animation-delay: 1.5s;  }
      .ln:nth-child(4)  { animation-delay: 2.0s;  }
      .ln:nth-child(5)  { animation-delay: 2.6s;  }
      .ln:nth-child(6)  { animation-delay: 3.1s;  }
      .ln:nth-child(7)  { animation-delay: 3.6s;  }
      .ln:nth-child(8)  { animation-delay: 4.1s;  }
      .ln:nth-child(9)  { animation-delay: 4.6s;  }
      .ln:nth-child(10) { animation-delay: 5.1s;  }
      .ln:nth-child(11) { animation-delay: 5.6s;  }
      @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
      .cur { opacity: 0; animation: blink 1.1s step-end 6.0s infinite; }
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      .scan { animation: sweep 5s linear infinite; }
      @keyframes sweep { 0% { transform: translateY(-300px); } 100% { transform: translateY(300px); } }
    </style>
    <clipPath id="tc"><rect width="520" height="300" rx="10"/></clipPath>
  </defs>

  <!-- Window -->
  <rect width="520" height="300" rx="10" fill="#1e1e2e"/>

  <!-- Title bar -->
  <rect width="520" height="34" rx="10" fill="#181825"/>
  <rect y="24" width="520" height="10" fill="#181825"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="17" r="6" fill="#27c93f"/>
  <text x="260" y="22" text-anchor="middle" font-family="monospace" font-size="12" fill="#6c7086">satellite_pipeline.py — ICPAC-IGAD</text>

  <!-- Scan-line shimmer -->
  <rect class="scan" x="0" y="0" width="520" height="3" fill="#42a5f5" opacity="0.07" clip-path="url(#tc)"/>

  <!-- Code lines -->
  <g font-family="'Courier New', Consolas, monospace" font-size="13.5">

    <g class="ln">
      <text x="18" y="62" fill="#cba6f7">import</text>
      <text x="72" y="62" fill="#cdd6f4"> ee, geopandas </text>
      <text x="228" y="62" fill="#cba6f7">as</text>
      <text x="252" y="62" fill="#cdd6f4"> gpd</text>
    </g>

    <g class="ln">
      <text x="18" y="82" fill="#cba6f7">from</text>
      <text x="57" y="82" fill="#cdd6f4"> django.contrib.gis.db </text>
      <text x="284" y="82" fill="#cba6f7">import</text>
      <text x="338" y="82" fill="#89b4fa"> models</text>
    </g>

    <g class="ln">
      <text x="18" y="102" fill="#6c7086"># East Africa Hazard Monitor · 11 countries</text>
    </g>

    <g class="ln">
      <text x="18" y="126" fill="#cba6f7">class</text>
      <text x="62" y="126" fill="#89dceb"> SatellitePipeline</text>
      <text x="226" y="126" fill="#cdd6f4">:</text>
    </g>

    <g class="ln">
      <text x="18" y="146" fill="#cba6f7">  def</text>
      <text x="51" y="146" fill="#a6e3a1"> fetch_ndvi</text>
      <text x="148" y="146" fill="#cdd6f4">(self, region, date):</text>
    </g>

    <g class="ln">
      <text x="18" y="166" fill="#cdd6f4">    image = ee.ImageCollection(</text>
      <text x="238" y="166" fill="#a6e3a1">'MODIS/006/MOD13Q1'</text>
      <text x="408" y="166" fill="#cdd6f4">)</text>
    </g>

    <g class="ln">
      <text x="18" y="186" fill="#cba6f7">    return</text>
      <text x="74" y="186" fill="#cdd6f4"> image.filterDate(date).clip(region)</text>
    </g>

    <g class="ln">
      <text x="18" y="210" fill="#cdd6f4">pipeline = </text>
      <text x="114" y="210" fill="#89dceb">SatellitePipeline</text>
      <text x="252" y="210" fill="#cdd6f4">()</text>
    </g>

    <g class="ln">
      <text x="18" y="230" fill="#cdd6f4">result   = pipeline.</text>
      <text x="172" y="230" fill="#a6e3a1">fetch_ndvi</text>
      <text x="262" y="230" fill="#cdd6f4">(east_africa, </text>
      <text x="378" y="230" fill="#fab387">"2024"</text>
      <text x="428" y="230" fill="#cdd6f4">)</text>
    </g>

    <g class="ln">
      <text x="18" y="256" fill="#a6e3a1">✓</text>
      <text x="34" y="256" fill="#94e2d5"> Done. 11 countries · 365 days processed.</text>
    </g>

    <g class="ln">
      <text x="18" y="276" fill="#89b4fa">$</text>
      <text x="34" y="276" fill="#6c7086"> _</text>
    </g>

  </g>

  <!-- Blinking cursor -->
  <rect class="cur" x="46" y="264" width="8" height="13" rx="1" fill="#94e2d5"/>
</svg>
