<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 380" width="1280" height="380">
  <defs>
    <filter id="code-blur">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
    <linearGradient id="blue-tint" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a1f4e" stop-opacity="0.52"/>
      <stop offset="100%" stop-color="#0d47a1" stop-opacity="0.44"/>
    </linearGradient>
    <linearGradient id="vignette-b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="60%" stop-color="#0a1f4e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a1f4e" stop-opacity="0.40"/>
    </linearGradient>
    <linearGradient id="vignette-l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#0a1f4e" stop-opacity="0.30"/>
      <stop offset="18%" stop-color="#0a1f4e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="vignette-r" x1="0" y1="0" x2="1" y2="0">
      <stop offset="82%" stop-color="#0a1f4e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a1f4e" stop-opacity="0.30"/>
    </linearGradient>
  </defs>

  <!-- ── Dark editor base ── -->
  <rect width="1280" height="380" fill="#0d1b2e"/>

  <!-- ── Editor chrome: tab bar ── -->
  <rect x="0" y="0" width="1280" height="30" fill="#111827" opacity="0.85"/>
  <rect x="0" y="0" width="148" height="30" fill="#1e2a42" opacity="0.9"/>
  <circle cx="18" cy="15" r="5.5" fill="#ff5f56" opacity="0.75"/>
  <circle cx="36" cy="15" r="5.5" fill="#ffbd2e" opacity="0.75"/>
  <circle cx="54" cy="15" r="5.5" fill="#27c93f" opacity="0.75"/>
  <text x="76" y="20" font-family="'Courier New', monospace" font-size="11.5" fill="#9aa5c4" opacity="0.7">satellite_pipeline.py</text>

  <!-- ── Line-number gutter ── -->
  <rect x="0" y="30" width="50" height="350" fill="#0c1726" opacity="0.75"/>

  <!-- ── Background code (blurred, low opacity) ── -->
  <g filter="url(#code-blur)" opacity="0.30" font-family="'Courier New', Consolas, monospace" font-size="13.5">

    <text x="14" y="58"  fill="#4a5a7a">1</text>
    <text x="65" y="58"  fill="#c792ea">import</text>
    <text x="116" y="58" fill="#d4d4d4"> ee, geopandas </text>
    <text x="290" y="58" fill="#c792ea">as</text>
    <text x="313" y="58" fill="#d4d4d4"> gpd</text>

    <text x="14" y="76"  fill="#4a5a7a">2</text>
    <text x="65" y="76"  fill="#c792ea">from</text>
    <text x="103" y="76" fill="#d4d4d4"> django.contrib.gis.db </text>
    <text x="330" y="76" fill="#c792ea">import</text>
    <text x="382" y="76" fill="#e4c07a"> models</text>

    <text x="14" y="94"  fill="#4a5a7a">3</text>
    <text x="65" y="94"  fill="#c792ea">from</text>
    <text x="103" y="94" fill="#d4d4d4"> shapely.geometry </text>
    <text x="283" y="94" fill="#c792ea">import</text>
    <text x="335" y="94" fill="#d4d4d4"> Point, Polygon</text>

    <text x="14" y="112" fill="#4a5a7a">4</text>
    <text x="65" y="112" fill="#6a9955"># ICPAC · East Africa Hazard Monitor</text>

    <text x="14" y="130" fill="#4a5a7a">5</text>
    <text x="65" y="130" fill="#d4d4d4"></text>

    <text x="14" y="148" fill="#4a5a7a">6</text>
    <text x="65" y="148" fill="#569cd6">class</text>
    <text x="108" y="148" fill="#4ec9b0"> HazardPipeline</text>
    <text x="248" y="148" fill="#d4d4d4">:</text>

    <text x="14" y="166" fill="#4a5a7a">7</text>
    <text x="65" y="166" fill="#d4d4d4">    </text>
    <text x="89"  y="166" fill="#569cd6">def</text>
    <text x="115" y="166" fill="#dcdcaa"> fetch_satellite_data</text>
    <text x="310" y="166" fill="#d4d4d4">(self, region, date_range):</text>

    <text x="14" y="184" fill="#4a5a7a">8</text>
    <text x="89"  y="184" fill="#d4d4d4">        image = ee.ImageCollection(</text>
    <text x="355" y="184" fill="#ce9178">'MODIS/006/MOD13Q1'</text>
    <text x="555" y="184" fill="#d4d4d4">)</text>

    <text x="14" y="202" fill="#4a5a7a">9</text>
    <text x="89"  y="202" fill="#d4d4d4">        </text>
    <text x="152" y="202" fill="#569cd6">return</text>
    <text x="198" y="202" fill="#d4d4d4"> image.filterDate(date_range).clip(region)</text>

    <text x="14" y="220" fill="#4a5a7a">10</text>
    <text x="65" y="220" fill="#d4d4d4"></text>

    <text x="14" y="238" fill="#4a5a7a">11</text>
    <text x="65" y="238" fill="#569cd6">    def</text>
    <text x="108" y="238" fill="#dcdcaa"> to_geojson</text>
    <text x="206" y="238" fill="#d4d4d4">(self, queryset):</text>

    <text x="14" y="256" fill="#4a5a7a">12</text>
    <text x="89"  y="256" fill="#d4d4d4">        gdf = gpd.GeoDataFrame.from_features(queryset)</text>

    <text x="14" y="274" fill="#4a5a7a">13</text>
    <text x="89"  y="274" fill="#569cd6">        return</text>
    <text x="154" y="274" fill="#d4d4d4"> gdf.to_json()</text>

    <text x="14" y="292" fill="#4a5a7a">14</text>
    <text x="65" y="292" fill="#d4d4d4"></text>

    <text x="14" y="310" fill="#4a5a7a">15</text>
    <text x="65" y="310" fill="#6a9955"># PostGIS · FastAPI · Docker · Kubernetes</text>

    <text x="14" y="328" fill="#4a5a7a">16</text>
    <text x="65" y="328" fill="#569cd6">class</text>
    <text x="108" y="328" fill="#4ec9b0"> DroughtIndex</text>
    <text x="222" y="328" fill="#d4d4d4">(models.Model):</text>

    <text x="14" y="346" fill="#4a5a7a">17</text>
    <text x="89"  y="346" fill="#d4d4d4">    geometry = models.</text>
    <text x="268" y="346" fill="#dcdcaa">PolygonField</text>
    <text x="372" y="346" fill="#d4d4d4">(srid=</text>
    <text x="430" y="346" fill="#b5cea8">4326</text>
    <text x="452" y="346" fill="#d4d4d4">)</text>

    <text x="14" y="364" fill="#4a5a7a">18</text>
    <text x="89"  y="364" fill="#d4d4d4">    ndvi_score = models.</text>
    <text x="280" y="364" fill="#dcdcaa">FloatField</text>
    <text x="358" y="364" fill="#d4d4d4">()</text>
  </g>

  <!-- ── Blue tint overlay ── -->
  <rect width="1280" height="380" fill="url(#blue-tint)"/>

  <!-- ── Cursor line highlight ── -->
  <rect x="0" y="158" width="1280" height="20" fill="#42a5f5" opacity="0.05"/>

  <!-- ── Vignettes ── -->
  <rect width="1280" height="380" fill="url(#vignette-b)"/>
  <rect width="1280" height="380" fill="url(#vignette-l)"/>
  <rect width="1280" height="380" fill="url(#vignette-r)"/>

  <!-- ── Eyebrow tag ── -->
  <rect x="526" y="82" width="228" height="26" rx="13" fill="#1565c0" opacity="0.55"/>
  <text x="640" y="100" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="11" fill="#90caf9" letter-spacing="2.5">ICPAC-IGAD · NAIROBI</text>

  <!-- ── Main headline ── -->
  <text x="640" y="182" text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="66" font-weight="700"
    fill="white" letter-spacing="-1.5">Code · Data · Maps</text>

  <!-- ── Name ── -->
  <text x="640" y="228" text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="20" fill="#bbdefb" letter-spacing="0.5">Meshack Kibet  —  Systems &amp; Geospatial Developer</text>

  <!-- ── Dot row ── -->
  <circle cx="601" cy="258" r="2.8" fill="#42a5f5" opacity="0.85"/>
  <circle cx="618" cy="258" r="2.8" fill="#42a5f5" opacity="0.85"/>
  <circle cx="635" cy="258" r="2.8" fill="#42a5f5" opacity="0.85"/>
  <circle cx="652" cy="258" r="2.8" fill="#42a5f5" opacity="0.85"/>
  <circle cx="669" cy="258" r="2.8" fill="#42a5f5" opacity="0.85"/>

  <!-- ── Location ── -->
  <text x="640" y="296" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="13"
    fill="#64b5f6" opacity="0.88" letter-spacing="1">Karen, Nairobi, Kenya  ·  1.2921°S  36.8219°E</text>
</svg>
