<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" width="680" height="300">
  <defs>
    <style>
      .radar-poly {
        stroke-dasharray: 255;
        stroke-dashoffset: 255;
        animation: draw 1.8s ease 0.4s forwards;
      }
      @keyframes draw { to { stroke-dashoffset: 0; } }
      .radar-fill {
        opacity: 0;
        animation: fillIn 0.6s ease 2.0s forwards;
      }
      @keyframes fillIn { to { opacity: 0.28; } }
      .dot {
        opacity: 0;
        animation: popIn 0.3s ease forwards;
      }
      .dot:nth-child(1) { animation-delay: 2.1s; }
      .dot:nth-child(2) { animation-delay: 2.2s; }
      .dot:nth-child(3) { animation-delay: 2.3s; }
      .dot:nth-child(4) { animation-delay: 2.4s; }
      @keyframes popIn { to { opacity: 1; } }
      .lbl { opacity: 0; animation: fadeIn 0.4s ease forwards; }
      .lbl:nth-child(1) { animation-delay: 2.2s; }
      .lbl:nth-child(2) { animation-delay: 2.3s; }
      .lbl:nth-child(3) { animation-delay: 2.4s; }
      .lbl:nth-child(4) { animation-delay: 2.5s; }
      @keyframes fadeIn { to { opacity: 1; } }
      .panel-in { opacity: 0; animation: fadeIn 0.5s ease 0.1s forwards; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="300" fill="#0d1117" rx="8"/>

  <!-- Divider -->
  <line x1="300" y1="18" x2="300" y2="282" stroke="#21262d" stroke-width="1"/>

  <!-- ── LEFT PANEL: Activity overview ── -->
  <g class="panel-in" font-family="'Segoe UI', system-ui, Arial, sans-serif">
    <!-- Title -->
    <text x="24" y="46" font-size="14" font-weight="600" fill="#e6edf3">Activity overview</text>

    <!-- Repo icon (SVG book path, simplified) -->
    <rect x="24" y="62" width="11" height="13" rx="1" fill="none" stroke="#8b949e" stroke-width="1.2"/>
    <line x1="27" y1="62" x2="27" y2="75" stroke="#8b949e" stroke-width="1.2"/>

    <text x="40" y="73" font-size="12" fill="#8b949e">Contributed to</text>

    <text x="24" y="98"  font-size="12" fill="#58a6ff">icpac-igad / ea-hazards-watch,</text>
    <text x="24" y="118" font-size="12" fill="#58a6ff">icpac-igad / droughtwatch,</text>
    <text x="24" y="138" font-size="12" fill="#58a6ff">icpac-igad / icpac.net</text>
    <text x="24" y="160" font-size="12" fill="#8b949e">and 10 other repositories.</text>
  </g>

  <!-- ── RIGHT PANEL: Radar chart (center 490, 148, r=100) ── -->

  <!-- Grid lines -->
  <line x1="490" y1="48"  x2="490" y2="248" stroke="#21262d" stroke-width="1"/>
  <line x1="390" y1="148" x2="590" y2="148" stroke="#21262d" stroke-width="1"/>
  <!-- Concentric guides at 33% and 66% of 100px -->
  <circle cx="490" cy="148" r="33" fill="none" stroke="#21262d" stroke-width="0.8"/>
  <circle cx="490" cy="148" r="66" fill="none" stroke="#21262d" stroke-width="0.8"/>

  <!--
    Polygon vertices (100px max radius):
      Code review (top,  8%): y = 148 - 8  = 140  → (490, 140)
      Issues     (right, 2%): x = 490 + 2  = 492  → (492, 148)
      PRs        (down, 25%): y = 148 + 25 = 173  → (490, 173)
      Commits    (left, 65%): x = 490 - 65 = 425  → (425, 148)
  -->

  <!-- Radar fill -->
  <polygon class="radar-fill"
    points="490,140 492,148 490,173 425,148"
    fill="#3fb950"/>

  <!-- Radar outline -->
  <polygon class="radar-poly"
    points="490,140 492,148 490,173 425,148"
    fill="none" stroke="#3fb950" stroke-width="2" stroke-linejoin="round"/>

  <!-- Vertex dots -->
  <g>
    <circle class="dot" cx="490" cy="140" r="4" fill="#3fb950"/>
    <circle class="dot" cx="492" cy="148" r="4" fill="#3fb950"/>
    <circle class="dot" cx="490" cy="173" r="4" fill="#3fb950"/>
    <circle class="dot" cx="425" cy="148" r="4" fill="#3fb950"/>
  </g>

  <!-- Axis labels -->
  <g font-family="'Segoe UI', system-ui, Arial, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">
    <g class="lbl">
      <text x="490" y="31">8%</text>
      <text x="490" y="44" font-weight="600">Code review</text>
    </g>
    <g class="lbl">
      <text x="617" y="145">2%</text>
      <text x="617" y="158" font-weight="600">Issues</text>
    </g>
    <g class="lbl">
      <text x="490" y="265">25%</text>
      <text x="490" y="278" font-weight="600">Pull requests</text>
    </g>
    <g class="lbl">
      <text x="363" y="145">65%</text>
      <text x="363" y="158" font-weight="600">Commits</text>
    </g>
  </g>
</svg>
